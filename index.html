<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltBOM - AI 驱动的硬件替代料与降本雷达</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-color: #060913;
            --card-bg: rgba(10, 18, 36, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-blue: #00f2fe;
            --accent-blue-hover: #00d2de;
            --accent-green: #10b981;
            --accent-red: #f43f5e;
            --glow-color: rgba(0, 242, 254, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Orbs */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.3) 0%, transparent 70%);
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.25) 0%, transparent 70%);
        }

        .orb-3 {
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 60%);
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            background: rgba(6, 9, 19, 0.6);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 3px;
            transform: rotate(45deg);
        }

        .header-tag {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-tag span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        #app {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 40px;
            display: flex;
            gap: 30px;
            flex-grow: 1;
            box-sizing: border-box;
        }

        /* Glassmorphism Panel style */
        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #left-panel {
            flex: 1;
            max-height: calc(100vh - 140px);
            position: sticky;
            top: 100px;
            overflow-y: auto;
        }

        #left-panel:hover {
            border-color: rgba(0, 242, 254, 0.2);
            box-shadow: 0 15px 40px -10px rgba(0, 242, 254, 0.05);
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title i {
            color: var(--accent-blue);
        }

        /* Drag & Drop Zone */
        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.01);
            padding: 20px;
            text-align: center;
        }

        #drop-zone:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            background: rgba(0, 242, 254, 0.02);
            box-shadow: inset 0 0 20px var(--glow-color);
        }

        .drop-icon {
            font-size: 54px;
            margin-bottom: 16px;
            transition: transform 0.3s ease;
        }

        #drop-zone:hover .drop-icon {
            transform: translateY(-8px);
        }

        .drop-text-main {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .drop-text-sub {
            font-size: 12px;
            opacity: 0.7;
        }

        #load-demo-btn {
            margin-top: 16px;
            padding: 10px 20px;
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 8px;
            color: var(--accent-blue);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        #load-demo-btn:hover {
            background: rgba(0, 242, 254, 0.18);
            border-color: var(--accent-blue-hover);
            box-shadow: 0 4px 12px var(--glow-color);
            transform: translateY(-1px);
        }

        #load-demo-btn:active {
            transform: translateY(1px);
        }

        /* Progress Log Box */
        #progress-box {
            display: none;
            background: rgba(3, 7, 18, 0.6);
            border-radius: 12px;
            padding: 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.7;
            overflow-y: auto;
            flex-grow: 1;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 150px;
        }

        #progress-box::-webkit-scrollbar {
            width: 6px;
        }

        #progress-box::-webkit-scrollbar-track {
            background: transparent;
        }

        #progress-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        #progress-box::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Analyze Button */
        #analyze-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 10px;
            color: #060913;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 20px var(--glow-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        #analyze-btn:hover {
            box-shadow: 0 6px 25px rgba(0, 242, 254, 0.35);
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        #analyze-btn:active {
            transform: translateY(1px);
        }

        #analyze-btn:disabled {
            background: rgba(255, 255, 255, 0.05) !important;
            color: var(--text-secondary) !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Right Panel */
        #right-panel {
            flex: 2;
            display: none;
            flex-direction: column;
            gap: 30px;
            overflow-y: auto;
            max-height: calc(100vh - 140px);
            padding-right: 5px;
        }

        #right-panel::-webkit-scrollbar {
            width: 6px;
        }

        #right-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        #right-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            #app {
                flex-direction: column;
                padding: 20px;
            }
            #left-panel {
                position: static;
                max-height: none;
            }
            #right-panel {
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .metrics-container {
                grid-template-columns: 1fr;
            }
            body > header {
                padding: 15px 20px !important;
            }
            #app {
                padding: 0 12px !important;
                margin: 10px auto !important;
            }
        }

        /* Card metrics */
        .metrics-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(16px);
        }
        .metric-value {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }
        /* BOM Table */
        .bom-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
        }
        .bom-table th, .bom-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        .bom-table tr:last-child td {
            border-bottom: none;
        }
        .bom-table th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-ok {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        .status-warn {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        /* Chip Schema Mapping styles */
        .chip-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            margin-top: 15px;
        }
        .chip-box {
            width: 120px;
            height: 120px;
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            position: relative;
            box-shadow: 0 0 15px var(--glow-color);
        }
    </style>
</head>
<body>
    <!-- Ambient glowing shapes for futuristic look -->
    <div class="ambient-glow orb-1"></div>
    <div class="ambient-glow orb-2"></div>
    <div class="ambient-glow orb-3"></div>

    <header>
        <div class="logo">AltBOM</div>
        <div class="header-tag">
            <span></span>黑客松速通 Demo 🚀
        </div>
    </header>

    <div id="app">
        <!-- Left Panel: Control / Upload Area -->
        <section id="left-panel" class="glass-panel">
            <h2 class="panel-title">BOM 物料导入</h2>
            
            <div id="drop-zone">
                <div class="drop-icon">📥</div>
                <div class="drop-text-main">拖拽 BOM 文件 (.csv) 到此区域</div>
                <div class="drop-text-sub">或者</div>
                <button id="load-demo-btn">加载智能手表 Demo 模板</button>
            </div>

            <div id="progress-box">
                <!-- Logs will be inserted here dynamically -->
            </div>

            <input type="file" id="file-input" accept=".csv" style="display: none;">
            <button id="analyze-btn">AI 智能分析 & 降本优化</button>
        </section>

        <!-- Right Panel (hidden initially, shown on analysis completion) -->
        <section id="right-panel">
            <div class="metrics-container">
                <div class="metric-card">
                    <div style="font-size: 12px; color: var(--text-secondary);">原 BOM 成本</div>
                    <div class="metric-value" style="color: var(--text-primary);">¥31.30</div>
                </div>
                <div class="metric-card">
                    <div style="font-size: 12px; color: var(--text-secondary);">AI 优化后成本</div>
                    <div class="metric-value" style="color: var(--accent-blue);">¥12.25</div>
                </div>
                <div class="metric-card" style="box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);">
                    <div style="font-size: 12px; color: var(--text-secondary);">整板降本比例</div>
                    <div class="metric-value" style="color: var(--accent-green);">60.8%</div>
                </div>
            </div>

            <div style="background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; backdrop-filter: blur(16px);">
                <h3 style="font-size: 16px; color: var(--accent-blue); margin-bottom: 15px;">智能平替比对清单</h3>
                <div style="overflow-x: auto; width: 100%;">
                    <table class="bom-table">
                        <thead>
                            <tr>
                                <th>位号/品类</th>
                                <th>原器件型号</th>
                                <th>AI 推荐平替型号</th>
                                <th>原成本</th>
                                <th>优化成本</th>
                                <th>兼容度 / 状态</th>
                            </tr>
                        </thead>
                        <tbody id="bom-table-body">
                            <!-- 动态加载或降级本地 Mock 渲染 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; backdrop-filter: blur(16px);">
                <h3 style="font-size: 16px; color: var(--accent-blue); margin-bottom: 10px;">关键芯片 Pin-to-Pin 引脚级平替比对图 (U1 MCU)</h3>
                <div class="chip-container">
                    <div class="chip-box" style="border-color: var(--accent-red); box-shadow: 0 0 15px rgba(244, 63, 94, 0.15);">
                        <div>STM32F103</div>
                        <div style="font-size:10px; color: var(--text-secondary); margin-top:5px;">LQFP48 (ST)</div>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center; color: var(--accent-green);">
                        <div style="font-size: 24px; animation: pulse 1.5s infinite;">↔</div>
                        <div style="font-size: 12px; font-weight: bold; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent-green);">100% 引脚硬兼容</div>
                    </div>
                    <div class="chip-box">
                        <div>GD32F103</div>
                        <div style="font-size:10px; color: var(--accent-blue); margin-top:5px;">LQFP48 (兆易)</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const loadDemoBtn = document.getElementById('load-demo-btn');
        const dropZone = document.getElementById('drop-zone');
        const progressBox = document.getElementById('progress-box');
        const analyzeBtn = document.getElementById('analyze-btn');
        const rightPanel = document.getElementById('right-panel');
        const fileInput = document.getElementById('file-input');

        let activeTimers = [];
        let currentCsvContent = ""; // 存储物理读取的 CSV 文本

        const logMessages = [
            { time: 200, msg: "🕒 [BOM PARSER] 正在读取 BOM CSV 结构，检测表头定义..." },
            { time: 500, msg: "🔍 [BOM PARSER] 表头语义智能对齐：[位号] ➡️ Designator | [器件型号] ➡️ Part Number" },
            { time: 900, msg: "📄 [RAG AGENT] 提取 U1 主控 STM32F103C8T6 型号，生成特征 Embedding 向量..." },
            { time: 1300, msg: "🌐 [VECTOR DB] 正在高维向量空间检索最邻近兼容器件 (KNN Vector Search)..." },
            { time: 1800, msg: "⚡ [AI INSIGHT] 检索成功：匹配到国产兆易创新 GD32F103C8T6，余弦相似度达 0.985 (引脚/封装LQFP48完全兼容)" },
            { time: 2200, msg: "📄 [RAG AGENT] 提取 U2 稳压芯片 AMS1117-3.3 参数特征并检索数据库..." },
            { time: 2600, msg: "💡 [AI INSIGHT] 发现 AMS1117-3.3 供货面临断货风险，推荐意法 LDK130M33R 进行无缝平替。" },
            { time: 3000, msg: "🔄 [VECTOR DB] 检索蓝牙 HC-05 经典蓝牙替代，匹配 JDY-31 向量片段，成本降低 62.5%..." },
            { time: 3400, msg: "🎨 [SYSTEM] 联网校验立创商城实时现货价格与库存，正在生成优化分析报告..." },
            { time: 3800, msg: "✅ [SUCCESS] AI 降本优化分析完成，已为您成功出具替代料分析清单！" }
        ];

        function addLog(text) {
            const logLine = document.createElement('div');
            logLine.style.marginBottom = '5px';
            logLine.style.color = text.includes('SUCCESS') ? 'var(--accent-green)' : text.includes('INSIGHT') ? 'var(--accent-blue)' : text.includes('SYSTEM') ? 'var(--accent-red)' : 'var(--text-secondary)';
            logLine.textContent = text;
            progressBox.appendChild(logLine);
            progressBox.scrollTop = progressBox.scrollHeight;
        }

        function handleFileLoaded(fileName, fileSize) {
            const sizeKb = (fileSize / 1024).toFixed(1);
            dropZone.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 10px;">📄</div>
                <div style="color: var(--accent-blue); font-weight: bold;">已载入: <span id="loaded-file-name"></span></div>
                <div style="font-size: 12px; margin-top: 5px;">大小: ${sizeKb} KB | 条目: 3 个核心器件</div>
            `;
            document.getElementById('loaded-file-name').textContent = fileName;
            
            // 重置右侧面板与日志状态，清除历史残留定时器
            rightPanel.style.display = 'none';
            progressBox.style.display = 'none';
            progressBox.innerHTML = '';
            activeTimers.forEach(clearTimeout);
            activeTimers = [];

            // 恢复拖拽与点击交互
            dropZone.style.pointerEvents = 'auto';
            dropZone.style.opacity = '1';

            analyzeBtn.style.display = 'block';
            analyzeBtn.disabled = false;
            analyzeBtn.style.opacity = '1';
        }

        // Drop zone click and file input trigger
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.name.toLowerCase().endsWith('.csv')) {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        currentCsvContent = evt.target.result;
                        handleFileLoaded(file.name, file.size);
                    };
                    reader.readAsText(file);
                } else {
                    alert('请上传 .csv 格式的 BOM 文件');
                }
            }
        });

        // Drag and Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--accent-blue)';
            dropZone.style.background = 'rgba(0, 242, 254, 0.05)';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '';
            dropZone.style.background = '';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            dropZone.style.background = '';
            const file = e.dataTransfer.files[0];
            if (file && file.name.toLowerCase().endsWith('.csv')) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    currentCsvContent = evt.target.result;
                    handleFileLoaded(file.name, file.size);
                };
                reader.readAsText(file);
            } else {
                alert('请上传 .csv 格式的 BOM 文件');
            }
        });

        // Load demo button
        loadDemoBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentCsvContent = `位号(Designator),器件型号(Part Number),描述(Description),封装(Package),数量(Quantity)
U1,STM32F103C8T6,ARM Cortex-M3 MCU 64KB Flash 72MHz,LQFP-48,1
U2,AMS1117-3.3,LDO Voltage Regulator 3.3V 1A,SOT-223,1
U3,W25Q64JVSSIQ,8MB SPI Serial Flash Memory,SOP-8,1
U4,ADXL345,3-Axis Digital Accelerometer Sensor,LGA-16,1
U5,TP4056,1A Standalone Linear Li-Po Battery Charger,SOP-8,1
BT1,HC-05,Bluetooth Serial Pass-through Module,SMD-6,1
R1,10K,Resistor 10k Ohm 1/10W 5%,0603,6
R2,1K,Resistor 1k Ohm 1/10W 5%,0603,4
C1,10uF,Ceramic Capacitor 10uF 16V,0603,4
C2,100nF,Ceramic Capacitor 0.1uF 50V,0603,8
Y1,8MHz,Quartz Crystal Oscillator Resonator,SMD-3225,1
LED1,Blue-LED,Indicator LED Blue,0603,2`;
            handleFileLoaded('Smart_Watch_BOM_v1.0.csv', 4915);
        });

        // 动态表格与指标渲染函数
        function renderResults(backendData) {
            const originalVal = document.querySelector('.metrics-container .metric-card:nth-child(1) .metric-value');
            const optimizedVal = document.querySelector('.metrics-container .metric-card:nth-child(2) .metric-value');
            const savingVal = document.querySelector('.metrics-container .metric-card:nth-child(3) .metric-value');
            const tbody = document.getElementById('bom-table-body');
            
            tbody.innerHTML = '';
            
            if (backendData) {
                // 渲染 Python 真实混合检索返回的结果
                originalVal.textContent = "¥" + backendData.original_total_cost.toFixed(2);
                optimizedVal.textContent = "¥" + backendData.optimized_total_cost.toFixed(2);
                savingVal.textContent = backendData.saving_rate;
                
                backendData.items.forEach(item => {
                    const tr = document.createElement('tr');
                    
                    // 加上跳转到立创商城真实搜索地址的链接
                    const mallLink = `<a href="https://so.szlcsc.com/global.html?k=${encodeURIComponent(item.recommend_model)}" target="_blank" style="color: var(--accent-blue); text-decoration: none; margin-left: 6px; font-size: 14px;" title="查验立创商城实时现货价格">🌐</a>`;
                    
                    const scoreBadge = `<span class="status-badge status-ok" title="余弦相似度: ${item.vector_score} | 关键字匹配度: ${item.keyword_score}">混合评分: ${item.score.toFixed(3)}</span>`;
                    
                    tr.innerHTML = `
                        <td>${item.designator}</td>
                        <td>${item.original_model} <span class="status-badge status-warn" style="margin-left:5px;">${item.original_status}</span></td>
                        <td><strong>${item.recommend_model}</strong>${mallLink} <span class="status-badge status-ok" style="margin-left:5px;">${item.recommend_status}</span></td>
                        <td>¥${item.original_cost.toFixed(2)}</td>
                        <td style="color: var(--accent-green); font-weight:bold;">¥${item.optimized_cost.toFixed(2)}</td>
                        <td><span class="status-badge status-ok" style="margin-right:5px;">${item.compatibility}</span>${scoreBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                // 离线降级 Mock 方案
                originalVal.textContent = "¥42.65";
                optimizedVal.textContent = "¥16.95";
                savingVal.textContent = "60.3%";
                
                const fallbackItems = [
                    { des: "U1 (主控 MCU)", orig: "STM32F103C8T6", origS: "供货紧张", rec: "GD32F103C8T6", recS: "国产首选", origC: 18.50, optC: 6.80, comp: "100% Pin-to-Pin", score: 0.985 },
                    { des: "U2 (LDO 稳压)", orig: "AMS1117-3.3", origS: "断货预警", rec: "LDK130M33R", recS: "库存充足", origC: 0.80, optC: 0.95, comp: "引脚兼容，功耗更低", score: 0.865 },
                    { des: "U3 (SPI Flash)", orig: "W25Q64JVSSIQ", origS: "货源紧俏", rec: "GD25Q64CSIG", recS: "性价比高", origC: 2.20, optC: 1.10, comp: "100% Pin-to-Pin", score: 0.942 },
                    { des: "U4 (加速度计)", orig: "ADXL345", origS: "价格偏高", rec: "LIS3DH", recS: "货源稳定", origC: 8.50, optC: 3.20, comp: "引脚兼容，功耗更低", score: 0.895 },
                    { des: "U5 (充电管理)", orig: "TP4056", origS: "库存中等", rec: "TC4056A", recS: "低成本", origC: 0.65, optC: 0.40, comp: "引脚及电气功能兼容", score: 0.824 },
                    { des: "BT1 (蓝牙模块)", orig: "HC-05", origS: "价格虚高", rec: "JDY-31", recS: "成本减半", origC: 12.00, optC: 4.50, comp: "功能/透传协议平替", score: 0.912 }
                ];
                
                fallbackItems.forEach(item => {
                    const tr = document.createElement('tr');
                    const mallLink = `<a href="https://so.szlcsc.com/global.html?k=${encodeURIComponent(item.rec)}" target="_blank" style="color: var(--accent-blue); text-decoration: none; margin-left: 6px; font-size: 14px;" title="查验立创商城实时现货价格">🌐</a>`;
                    
                    tr.innerHTML = `
                        <td>${item.des}</td>
                        <td>${item.orig} <span class="status-badge status-warn" style="margin-left:5px;">${item.origS}</span></td>
                        <td><strong>${item.rec}</strong>${mallLink} <span class="status-badge status-ok" style="margin-left:5px;">${item.recS}</span></td>
                        <td>¥${item.origC.toFixed(2)}</td>
                        <td style="color: var(--accent-green); font-weight:bold;">¥${item.optC.toFixed(2)}</td>
                        <td><span class="status-badge status-ok" style="margin-right:5px;">${item.comp}</span><span class="status-badge status-ok">混合评分: ${item.score.toFixed(3)}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        // Analyze button
        analyzeBtn.addEventListener('click', () => {
            analyzeBtn.disabled = true;
            analyzeBtn.style.opacity = '0.6';
            progressBox.style.display = 'block';
            progressBox.innerHTML = '';
            
            // 锁定上传拖拽区交互以防并发干扰
            dropZone.style.pointerEvents = 'none';
            dropZone.style.opacity = '0.5';

            activeTimers.forEach(clearTimeout);
            activeTimers = [];

            // 并行向本地 Python 后端发起真实混合检索请求
            let backendData = null;
            let useFallback = false;

            fetch("http://localhost:5000/api/analyze", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ csv: currentCsvContent })
            })
            .then(res => {
                if (!res.ok) throw new Error("Server response not ok");
                return res.json();
            })
            .then(data => {
                backendData = data;
            })
            .catch(err => {
                useFallback = true;
                console.log("本地混合检索后端未运行或连接失败，将采用前端离线缓存方案。", err);
            });
            
            logMessages.forEach(item => {
                const timerId = setTimeout(() => {
                    // 如果中途判定需要降级，插入提示日志
                    if (useFallback && item.msg.includes('SYSTEM')) {
                        addLog("📡 [SYSTEM] 混合检索后端连接失败，已自动降级为前端离线缓存进行仿真推理...");
                    }
                    addLog(item.msg);
                    
                    if (item.msg.includes('SUCCESS')) {
                        // 动态数据渲染
                        renderResults(backendData);

                        rightPanel.style.display = 'flex';
                        
                        // 恢复拖拽交互
                        dropZone.style.pointerEvents = 'auto';
                        dropZone.style.opacity = '1';

                        // Scroll to view
                        rightPanel.scrollIntoView({ behavior: 'smooth' });
                    }
                }, item.time);
                activeTimers.push(timerId);
            });
        });
    </script>
</body>
</html>
